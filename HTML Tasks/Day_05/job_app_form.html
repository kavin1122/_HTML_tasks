<!DOCTYPE html>
<head>
    <title>Job Application Form</title>
</head>

<body>
    <h1>Job Application</h1>
    <hr>
    <form>
        <fieldset>
            <legend>Personal Info</legend>
            Full Name: <input type="text" required><br><br>
            Resume: <input type="file"><br><br>
        </fieldset>

        <fieldset>
            <legend>Application Details</legend>
            About Yourself:<br>
            <textarea rows="10" cols="50"></textarea><br><br>
            Experience Level:
            1<input type="range" min="1" max="10">10<br><br>
        </fieldset>

        <input type="submit" value="Apply">
    </form>

</body>
<br>

</html>
