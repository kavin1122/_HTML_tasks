<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registration Form</title>
</head>

<body>
    <h1>Registration Form</h1>
    <hr>
    <h3>Student Details</h3>
    <form>
        Name: <input type="text" placeholder="Enter your name"><br><br>
        Email: <input type="email" placeholder="Enter your email"><br><br>
        Password: <input type="password" placeholder="Enter your password"><br><br>
        Phone: <input type="number" placeholder="Enter your phone no"><br><br>
        Birthday: <input type="date"><br><br>
        Gender:
        <input type="radio" name="Gender"> Male
        <input type="radio" name="Gender"> Female <br><br>
        Hobbies:
        <input type="checkbox"> Playing Games
        <input type="checkbox"> Dancing
        <input type="checkbox"> Reading <br><br>
        Department:
        <select>
        <option>CSE</option>
        <option>ECE</option>
        <option>IT</option>
        </select> <br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
<br>

</footer>

</html>
